<section id="check-availability-section" class="check-availability-section">
  <div class="container">
    <div class="section-header">
      <h2 class="section-title">Check Availability</h2>
      <p class="section-subtitle">Browse our calendar and secure your dates at Blue Quartz Apartment.</p>
    </div>

    <div class="availability-content-grid">
      <!-- Left side: Existing Form -->
      <div class="check-availability-form-wrapper">
        <form class="quartz-form" (submit)="onSubmit($event)">
        
        <div class="form-row">
          <div class="form-group">
            <label for="fullName">Full Name*</label>
            <input #fullName type="text" id="fullName" placeholder="Your Name" required>
          </div>
          <div class="form-group">
            <label for="email">Email Address*</label>
            <input #email type="email" id="email" placeholder="you@example.com" required>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="checkIn">Check-in*</label>
            <div class="date-input-wrapper">
              <input type="text" id="checkIn" autocomplete="off"  #checkInPicker  placeholder="Select Check-in date" required>
              <span class="material-icons date-icon">calendar_today</span>
            </div>
          </div>
          <div class="form-group">
            <label for="checkOut">Check-out*</label>
            <div class="date-input-wrapper">
              <input type="text" id="checkOut" #checkOutPicker autocomplete="off" placeholder="Select Check-out date" required>
              <span class="material-icons date-icon">calendar_today</span>
            </div>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="guests">Number of Guests*</label>
            <div class="select-wrapper">
              <select #guests id="guests" required>
                <option value="1">1 Guest</option>
                <option value="2">2 Guests</option>
                <option value="3">3 Guests</option>
                <option value="4">4 Guests</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <!-- Empty column to keep Guests field nicely sized -->
          </div>
        </div>

        <div class="form-group">
          <label for="message">Your Inquiry</label>
          <textarea #message id="message" rows="4" placeholder="How can we help you? Tell us a bit about your stay..."></textarea>
        </div>

        <div class="form-group checkbox-group">
          <label class="checkbox-label" for="gdprConsent">
            <input type="checkbox" id="gdprConsent" required>
            <span>* I agree to the storage and processing of my personal data for this booking inquiry.</span>
          </label>
        </div>

        <div class="form-submit">
          <button type="submit" class="btn-submit">Send Inquiry <span class="material-icons">send</span></button>
        </div>

      </form>
    </div>

    <!-- Right side: Availability Calendar -->
    <div class="availability-calendar-wrapper">
      
      
      <div class="calendar-card">
        <div class="calendar-container">
          <!-- Container specifically for flatpickr inline to anchor to -->
          <input type="text" #inlineCalendar id="inlineCalendar" style="display:none;">
        </div>
      </div>
      
      <div class="calendar-legend">
        <label class="legend-item">
          <input type="radio" disabled checked class="legend-radio available-radio">
          <span>Available</span>
        </label>
        <label class="legend-item">
          <input type="radio" disabled class="legend-radio booked-radio">
          <span>Booked</span>
        </label>
      </div>
    </div>
    
  </div>
  </div>
</section>

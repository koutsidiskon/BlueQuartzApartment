services:
  # 1. Βάση Δεδομένων (MariaDB)
  db:
    image: mariadb:11.4
    container_name: bq_mariadb
    restart: always
    env_file: .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql

  # 2. Το Backend (Node.js API)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bq_backend
    restart: always
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      - db

  # 3. Το Frontend (Angular + Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bq_frontend
    restart: always
    ports:
      - "4200:80"
    depends_on:
      - backend

# Χώρος αποθήκευσης δεδομένων
volumes:
  mariadb_data:
